name: Verify

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: test-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: test-project.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: test-project.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: 1:000000000000:web:0000000000000000000000
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: G-0000000000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_USE_API: "true"
      NEXT_PUBLIC_ENABLE_DEV_MOCK: "false"
      NEXT_PUBLIC_ENABLE_TRACKING_DEMO: "false"
      EXTERNAL_ORDER_PROVIDER_MODE: mock
      EXTERNAL_ORDER_LIVE_READS_ENABLED: "false"
      EXTERNAL_ORDER_LIVE_SYNC_ENABLED: "false"
      APP_TIMEZONE: America/Edmonton

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
